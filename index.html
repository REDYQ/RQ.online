<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime_List</title>
    <style>
        :root { --primary: #F44336; --accent: #FFEB3B; --bg: #0f0f0f; }
        body { background: var(--bg); background: radial-gradient(circle, #1a1a1a 0%, #000 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; }

        .player { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px); margin: 5%; padding: 30px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.1); width: 320px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }

        #icon { width: 220px; height: 220px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .playing #icon { transform: scale(1.05); }

        .track-info { margin-bottom: 20px; }
        #track-name { font-size: 20px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        #track-author { font-size: 14px; font-weight: 400; margin: 5px 0 0; opacity: 0.5; letter-spacing: 0.5px; }

        .progress-container { background: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 10px; cursor: pointer; overflow: hidden; }
        .progress { background: linear-gradient(90deg, var(--primary), var(--accent)); height: 100%; width: 0%; transition: width 0.1s linear; }

        .time-info { display: flex; justify-content: space-between; font-size: 11px; margin: 8px 0 20px; opacity: 0.4; font-variant-numeric: tabular-nums; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn { background: none; border: none; cursor: pointer; color: white; transition: 0.2s; display: flex; align-items: center; padding: 10px; }
        .btn:hover { color: var(--primary); transform: scale(1.1); }
        .btn-play { background: white; color: black; width: 55px; height: 55px; border-radius: 50%; justify-content: center; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-play:hover { background: var(--primary); color: white; }
        svg { fill: currentColor; }
    </style>
</head>
<body>

<div class="player" id="player-container">
    <img id="icon" src="" alt="Cover">
    
    <div class="track-info">
        <p id="track-name">Loading...</p>
        <p id="track-author">Loading...</p>
    </div>

    <div class="progress-container" id="progress-container">
        <div class="progress" id="progress"></div>
    </div>
    
    <div class="time-info">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button class="btn" id="prev"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="btn btn-play" id="play"><svg width="28" height="28" viewBox="0 0 24 24"><path id="play-path" d="M8 5v14l11-7z"/></svg></button>
        <button class="btn" id="next"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg></button>
    </div>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/REDYQ/RQ/refs/heads/main/data.json';
    const audio = new Audio();
    let tracks = [], currentIdx = 0, isPlaying = false;

    const playPath = document.getElementById('play-path'),
          icon = document.getElementById('icon'),
          nameEl = document.getElementById('track-name'),
          authorEl = document.getElementById('track-author'),
          progress = document.getElementById('progress'),
          currTimeEl = document.getElementById('current-time'),
          durationEl = document.getElementById('duration');

    async function init() {
        try {
            const res = await fetch(JSON_URL);
            tracks = await res.json();
            if (tracks.length > 0) loadTrack(0);
        } catch (err) { 
            nameEl.innerText = "Network ERROR";
            console.error(err); 
        }
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function loadTrack(idx) {
        const track = tracks[idx];
        icon.src = track.icon;
        nameEl.innerText = track.name || "Без названия";
        authorEl.innerText = track.autor || "Неизвестный автор";
        audio.src = track.mp3;
        audio.load();
        if (isPlaying) audio.play();
    }

    document.getElementById('play').onclick = () => {
        if (isPlaying) {
            audio.pause();
            playPath.setAttribute('d', 'M8 5v14l11-7z');
        } else {
            audio.play();
            playPath.setAttribute('d', 'M6 19h4V5H6zm8-14v14h4V5h-4z');
        }
        isPlaying = !isPlaying;
        document.getElementById('player-container').classList.toggle('playing', isPlaying);
    };

    audio.ontimeupdate = () => {
        progress.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
        currTimeEl.innerText = formatTime(audio.currentTime);
        if (!isNaN(audio.duration)) durationEl.innerText = formatTime(audio.duration);
    };

    audio.onloadedmetadata = () => durationEl.innerText = formatTime(audio.duration);
    document.getElementById('next').onclick = () => { currentIdx = (currentIdx + 1) % tracks.length; loadTrack(currentIdx); };
    document.getElementById('prev').onclick = () => { currentIdx = (currentIdx - 1 + tracks.length) % tracks.length; loadTrack(currentIdx); };
    document.getElementById('progress-container').onclick = (e) => {
        audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration;
    };
    audio.onended = () => document.getElementById('next').click();

    init();
</script>
</body>
</html>
