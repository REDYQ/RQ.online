<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RQ | Anime_Music</title>
    <style>
        :root { 
            --primary-grad: linear-gradient(90deg, #F44336 0%, #FF9800 100%); 
            --bg-dynamic: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.08);
            --text-outline: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { 
            background: #000; background: radial-gradient(circle at center, var(--bg-dynamic) 0%, #000 100%);
            transition: background 1s ease; display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; 
        }
        
        #bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; opacity: 0; transition: opacity 1s; pointer-events: none;
        }
        
        .screen { 
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 20px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); 
            width: calc(100vw - 30px); max-width: 360px; height: calc(100vh - 40px); max-height: 580px; position: absolute;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 20%;
        }
        .screen-hidden { transform: translateY(100%); opacity: 0; pointer-events: none; visibility: hidden; }
        .screen-active { transform: translateY(0); opacity: 1; z-index: 10; visibility: visible; }
        
        #player-screen { justify-content: space-between; padding-top: 40px; padding-bottom: 30px; }
        .top-group { margin-top: 40px; text-align: center; }
        
        .bars-wrapper { width: 30px; height: 20px; display: flex; align-items: flex-end; justify-content: center; margin-right: 8px; flex-shrink: 0; }
        .playing-bars { display: none; align-items: flex-end; gap: 2px; }
        .track-item.active.playing .playing-bars { display: flex; }
        .bar { width: 3px; background: white; border-radius: 2px; animation: bar-wave 0.6s infinite ease-in-out alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bar-wave { from { height: 4px; } to { height: 16px; } }
        
        #icon { width: 65vw; height: 65vw; max-width: 240px; max-height: 240px; border-radius: 35px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.6); margin-bottom: 30px; }
        
        .track-info { width: 100%; text-align: center; }
        #track-name { font-size: 20px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--text-outline); }
        #track-author { font-size: 14px; margin: 2px 0 0; opacity: 0.7; }

        .list-container { width: 100%; flex: 1; overflow-y: auto; padding: 5px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; background: rgba(255,255,255,0.02); transition: 0.2s; }
        .track-item.active { background: rgba(255,255,255,0.12); }
        .item-icon { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; margin-right: 12px; flex-shrink: 0; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; }
        .btn { background: none; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; transition: transform 0.1s ease; }
        .btn-side { opacity: 0.6; }
        
        .btn-play-wrapper { position: relative; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .btn-play { background: white; color: black !important; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 2; }
        .btn-play svg { fill: black !important; margin-left: 3px; } 
        
        .loader { position: absolute; width: 72px; height: 72px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #F44336; border-radius: 50%; display: none; animation: spin 1s linear infinite; z-index: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .btn-anim:active { transform: scale(0.85); }
        
        .progress-container { background: rgba(255,255,255,0.1); height: 5px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 2px; }
        .progress { background: var(--primary-grad); height: 100%; width: 0%; border-radius: 10px; }
        .time-info { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.5; width: 100%; margin-top: 4px; }
        svg { fill: currentColor; }
        
        #info-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 85%; padding: 25px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s;
            max-height: 85vh;
   		 overflow-y: auto;
        }
        #info-modal.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .info-item { margin-bottom: 12px; font-size: 14px; }
        .info-label { font-weight: bold; color: #FF9800; margin-right: 5px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 90; display: none; background: rgba(0,0,0,0.4); }
        
        .bg-switcher { display: flex; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 15px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .sw-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; color: rgba(255,255,255,0.5); }
        .sw-btn.active { background: white; color: black; }
        .sw-btn.disabled { opacity: 0.2; }
        
        #video-player-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .v-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #full-video { width: 100%; max-height: 70vh; background: #000; }
        .v-controls { width: 90%; max-width: 360px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .v-bottom-row { display: flex; align-items: center; gap: 15px; }
        .v-play-btn { background: white; color: black !important; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .v-play-btn svg { fill: black !important; width: 20px; height: 20px; }

        #toast { position: fixed; bottom: 12%; left: 50%; transform: translateX(-50%); background: rgba(255,67,54,0.9); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
        
		@media (orientation: landscape) and (max-height: 500px) {
			.screen { 
  		      flex-direction: row !important;
   		     max-width: 90vw !important; 
  		      height: 85vh !important; 
    		    padding: 15px 25px !important;
 		       margin-bottom: 0 !important;
		    }
 		   .top-group { 
 		       display: flex !important;
   		     flex-direction: row !important;
    		    align-items: center !important;
 		       text-align: left !important;
   		     margin-top: 0 !important;
  		      flex: 1.3 !important;
  		      gap: 20px !important;
		     }
			#icon { width: 130px !important; height: 130px !important; margin-bottom: 0 !important; }
			.track-info { text-align: left; flex: 1; }
			#player-screen > div:last-child {
    		    flex: 1;
    		    display: flex;
    		    flex-direction: column;
     		   justify-content: center;
  		  }
   		 #back-to-list, #open-info { top: 15px !important; }
   
			#playlist-screen > div:first-child {
     			 padding: 5px 10px !important;
      			margin-bottom: 5px !important;
  		   }
  
 			#playlist-screen span {
      			font-size: 16px !important;
 		    }
    
  		  #playlist-screen {
     			max-width: 85vw !important; 
       		  height: 90vh !important;
       		  margin-bottom: 0 !important;
       		  padding: 10px 20px !important;
    			 flex-direction: column !important;
  		   }

 		   #playlist-screen .list-container {
     			display: grid !important;
      		   grid-template-columns: 1fr 1fr !important;
      		   gap: 10px !important; 
    		     max-height: 55vh !important;
 		        overflow-y: auto !important;
				 padding: 0 5px !important;
  		   }
  
  		 .group-header {
     			  grid-column: 1 / -1;
   		  }
		}
		
		.group-header {
			   width: 100%;
  			 padding: 15px 10px 4px;
			   font-size: 11px;
 			  font-weight: bold;
			   color: #FF9800;
 			  text-transform: uppercase;
 			  letter-spacing: 0.5px;
  			 opacity: 0.6;
		}
    </style>
</head>
<body>

<video id="bg-video" loop muted playsinline></video>
<div class="modal-overlay" id="overlay"></div>
<div id="toast">Для данного трека видео отсутствует</div>

<div id="video-player-container">
    <div class="v-header">
        <span id="v-title" style="font-size: 14px; font-weight: bold;">Видео</span>
        <button class="btn" onclick="closeVideoPlayer(event)" style="color: #F44336; font-weight: bold; font-size: 16px;">Закрыть</button>
    </div>
    <video id="full-video" controlsList="nodownload" oncontextmenu="return false;"></video>
    <div class="v-controls">
        <div class="progress-container" id="v-p-cont"><div class="progress" id="v-p-bar" style="background: white;"></div></div>
        <div class="v-bottom-row">
            <button class="btn v-play-btn btn-anim" onclick="toggleVideoPlay()">
                <svg viewBox="0 0 24 24"><path id="v-p-path" d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="time-info" style="margin: 0; flex: 1; font-weight: bold;"><span id="v-curr">0:00</span><span id="v-dur">0:00</span></div>
        </div>
    </div>
</div>

<div id="info-modal">
    <div class="info-item"><span class="info-label">Источник:</span><span id="info-source">-</span></div>
    <div class="info-item"><span class="info-label">Эпизод:</span><span id="info-episode">-</span></div>
    <div class="info-item"><span class="info-label">Тип:</span><span id="info-type">-</span> [<span id="info-full">-</span>]</div>
    <div style="font-size: 13px; margin-top: 35px; opacity: 0.6;">Режим фона:</div>
    <div class="bg-switcher">
        <div class="sw-btn active" id="sw-color" onclick="setBgMode('color')">Цвет</div>
        <div class="sw-btn" id="sw-video" onclick="setBgMode('video')">Видео</div>
    </div>
    <button class="btn btn-anim" id="btn-watch-video" style="margin-top: 15px; width: 100%; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; font-size: 13px; font-weight: bold;" onclick="openFullVideo()">Открыть видео</button>
    <button class="btn btn-anim" style="margin-top: 15px; width: 100%; color: #F44336; font-weight: bold;" onclick="closeModal()">Закрыть</button>
</div>

<div class="screen screen-hidden" id="player-screen">
    <div class="btn btn-anim" id="back-to-list" style="position:absolute; top:25px; left:20px;"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></div>
    <div class="btn btn-anim" id="open-info" style="position:absolute; top:25px; right:20px;"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></div>
    <div class="top-group">
        <img id="icon" src="" crossorigin="anonymous">
        <div class="track-info"><p id="track-name"></p><p id="track-author"></p></div>
    </div>
    <div style="width: 100%; padding: 0 10px;">
        <div class="progress-container" id="p-cont"><div class="progress" id="p-bar"></div></div>
        <div class="time-info"><span id="curr">0:00</span><span id="dur">0:00</span></div>
        <div class="controls">
            <button class="btn btn-side btn-anim" id="shuf"><svg id="sh-icon" width="20" height="20" viewBox="0 0 24 24"></svg></button>
            <button class="btn btn-anim" id="prev"><svg width="34" height="34" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <div class="btn-play-wrapper"><div class="loader" id="loader"></div><button class="btn btn-play btn-anim" id="play"><svg id="play-icon-svg" width="32" height="32" viewBox="0 0 24 24"><path id="p-path" d="M8 5v14l11-7z"/></svg></button></div>
            <button class="btn btn-anim" id="next"><svg width="34" height="34" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg></button>
            <button class="btn btn-side btn-anim" id="rep"><svg id="re-icon" width="20" height="20" viewBox="0 0 24 24"></svg></button>
        </div>
    </div>
</div>

<div class="screen screen-active" id="playlist-screen">
<!--*-->
	<div style="width:100%; display: flex; justify-content: space-between; align-items: center; padding: 5px 0px 15px 10px;">
        <span style="font-size:22px; font-weight:bold;">Музыка</span>
        
     <div style="display: flex; gap: 0px;">
        <!-- Кнопка сворачивания (черточка) -->
        <button class="btn btn-anim" onclick="minimizePlayer()" style="padding: 5px; opacity: 0.8;">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
        
        <!-- Новая кнопка закрытия (крестик) -->
        <button class="btn btn-anim" onclick="closeFullPlayer()" style="padding: 5px; opacity: 0.8;">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>
        
    </div>
<!--*-->
    <div class="list-container" id="list"></div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    let JSON_URL = ''; 
    let isInitializing = false; 
    const audio = document.getElementById('audio'), icon = document.getElementById('icon'), videoBg = document.getElementById('bg-video');
    const fullVideo = document.getElementById('full-video'), videoContainer = document.getElementById('video-player-container'), loader = document.getElementById('loader');
    let tracks = [], currentIdx = 0, isPlaying = false, isShuffle = false, isRepOne = false, currentBgMode = 'color', shuffleQueue = [];
    
    const fmt = (s) => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2,'0');
    const icons = {
        shOrd: '<path d="M20 9l-4 4V10H4V8h12V5l4 4zm-4 8V14H4v2h12v3l4-4-4-4z"/>',
        shRan: '<path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.59 10.83l-1.41 1.41 3.13 3.13L14.5 22H20v-5.5l-2.04 2.04-3.37-3.37z"/>',
        reNon: '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>',
        reOne: '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>'
    };

    async function init() {
        if (!JSON_URL || isInitializing) return;
        isInitializing = true;
        try {
       	 audio.pause();
    	    audio.src = "";
  	      isPlaying = false;
   	     currentIdx = 0;
			icon.src = "";
   	     document.getElementById('p-bar').style.width = '0%';
  	      document.getElementById('curr').innerText = "0:00";
  	      document.getElementById('dur').innerText = "0:00";
		    updatePlayBtn();
        
            const res = await fetch(JSON_URL);
            tracks = await res.json();
            
			document.getElementById('playlist-screen').className = 'screen screen-active';
			document.getElementById('player-screen').className = 'screen screen-hidden';
            
            renderPlaylist();
			loadTrack(0, false);
			updateIcons();
        } catch (e) {
			console.error(e); 
		} finally {
       	 isInitializing = false;
   	 }
    }
    
    function renderPlaylist() {
 	  let html = '';
   	let lastSource = null;
    tracks.forEach((t, i) => {
        if (t.source && t.source !== lastSource) {
            html += `<div class="group-header">${t.source}</div>`;
            lastSource = t.source;
        }
        
        html += `
            <div class="track-item ${i === currentIdx ? 'active' : ''}" id="track-${i}" onclick="selectTrack(${i})">
                <div class="bars-wrapper">
                    <div class="playing-bars">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                </div>
                <img src="${t.icon}" class="item-icon">
                <div class="item-info">
                    <b>${t.name}</b><br><small>${t.autor}</small>
                </div>
            </div>`;
	   });
 	  document.getElementById('list').innerHTML = html;
	}


    function selectTrack(i) {
        if (currentIdx === i && audio.src) toggleScreen('player');
        else { currentIdx = i; loadTrack(i, true); toggleScreen('player'); }
    }

    function setBgMode(mode) {
        const t = tracks[currentIdx];
        if (mode === 'video' && (!t.video || t.video === '#')) {
            const toast = document.getElementById('toast');
            toast.style.opacity = 1; setTimeout(() => toast.style.opacity = 0, 2000);
            return;
        }
        currentBgMode = mode;
        updateBgVisual();
    }

    function updateBgVisual() {
        const t = tracks[currentIdx];
        const isVideo = currentBgMode === 'video' && t && t.video && t.video !== '#';
        document.getElementById('sw-color').classList.toggle('active', !isVideo);
        document.getElementById('sw-video').classList.toggle('active', isVideo);
        if (isVideo) {
            if (videoBg.src !== t.video) { videoBg.src = t.video; videoBg.load(); }
            videoBg.style.opacity = 1;
            if (isPlaying) videoBg.play().catch(()=>{});
        } else { videoBg.style.opacity = 0; videoBg.pause(); }
    }

    function loadTrack(idx, play) {
        const t = tracks[idx]; if(!t) return;
        icon.src = t.icon;
        document.getElementById('track-name').innerText = t.name;
        document.getElementById('track-author').innerText = t.autor;
        audio.src = t.music;
        let volValue = parseInt(t.volume_master);
        audio.volume = (volValue === 0) ? 1.0 : (Math.max(0.01, (volValue || 100) / 100));
        document.getElementById('info-source').innerText = t.source || '-';
        document.getElementById('info-episode').innerText = t.episode || '-';
        document.getElementById('info-type').innerText = t.type || '-';
        document.getElementById('info-full').innerText = t.full || '-';
        document.getElementById('sw-video').classList.toggle('disabled', !t.video || t.video === '#');
        document.getElementById('btn-watch-video').style.display = (!t.video || t.video === '#') ? 'none' : 'block';
        updateBgVisual();
        document.querySelectorAll('.track-item').forEach((el, i) => { el.classList.remove('playing'); el.classList.toggle('active', i === idx); });
        
        icon.onload = () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 1; canvas.height = 1; ctx.drawImage(icon, 0, 0, 1, 1);
            const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
            document.documentElement.style.setProperty('--bg-dynamic', `rgb(${r},${g},${b})`);
        };

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: t.name, artist: t.autor, artwork: [{ src: t.icon, sizes: '512x512', type: 'image/png' }] });
            navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        }

        if (play) { audio.play().catch(()=>{}); isPlaying = true; updatePlayBtn(); }
    }

    function openFullVideo() {
        const t = tracks[currentIdx];
        if (t && t.video && t.video !== '#') {
            audio.pause(); document.getElementById('v-title').innerText = t.name;
            fullVideo.src = t.video; videoContainer.style.display = 'flex'; fullVideo.play();
        }
    }

    function toggleVideoPlay() { if (fullVideo.paused) fullVideo.play(); else fullVideo.pause(); }
    function closeVideoPlayer(e) { if (e) e.stopPropagation(); fullVideo.pause(); fullVideo.src = ""; videoContainer.style.display = 'none'; }
    
    function nextTrack() {
        if (isShuffle) {
            if (shuffleQueue.length === 0) {
                shuffleQueue = Array.from({length: tracks.length}, (_, i) => i).filter(i => i !== currentIdx);
                shuffleQueue.sort(() => Math.random() - 0.5);
            }
            currentIdx = shuffleQueue.pop();
        } else { currentIdx = (currentIdx + 1) % tracks.length; }
        loadTrack(currentIdx, true);
    }
    
    function prevTrack() { currentIdx = (currentIdx - 1 + tracks.length) % tracks.length; loadTrack(currentIdx, true); }
    
    function updatePlayBtn() { 
        const path = document.getElementById('p-path');
        path.setAttribute('d', isPlaying ? 'M6 19h4V5H6zm8-14v14h4V5h-4z' : 'M8 5v14l11-7z');
        document.getElementById('play-icon-svg').style.marginLeft = isPlaying ? "0px" : "0px";
    }

    function toggleScreen(type) {
    const listScr = document.getElementById('playlist-screen');
    const playScr = document.getElementById('player-screen');
    
    if (type === 'player') {
        listScr.classList.remove('screen-active');
        listScr.classList.add('screen-hidden');
        playScr.classList.remove('screen-hidden');
        playScr.classList.add('screen-active');
    } else {
        playScr.classList.remove('screen-active');
        playScr.classList.add('screen-hidden');
        listScr.classList.remove('screen-hidden');
        listScr.classList.add('screen-active');
    }
}

    
    function updateIcons() { document.getElementById('sh-icon').innerHTML = isShuffle ? icons.shRan : icons.shOrd; document.getElementById('re-icon').innerHTML = isRepOne ? icons.reOne : icons.reNon; }
    
    function sendStatus(playing) { 
        const t = tracks[currentIdx]; 
        if (t) window.parent.postMessage({ type: 'STATUS_DATA', isPlaying: playing, name: t.name, autor: t.autor, img: t.icon }, '*'); 
    }

    document.getElementById('play').onclick = () => { if (isPlaying) audio.pause(); else audio.play(); };
    document.getElementById('next').onclick = nextTrack;
    document.getElementById('prev').onclick = prevTrack;
    document.getElementById('shuf').onclick = () => { isShuffle = !isShuffle; shuffleQueue = []; updateIcons(); };
    document.getElementById('rep').onclick = () => { isRepOne = !isRepOne; updateIcons(); };
    document.getElementById('back-to-list').onclick = () => toggleScreen('list');
    document.getElementById('open-info').onclick = () => { document.getElementById('info-modal').classList.add('active'); document.getElementById('overlay').style.display = 'block'; };
    function closeModal() { document.getElementById('info-modal').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    document.getElementById('overlay').onclick = closeModal;

    audio.onwaiting = () => loader.style.display = 'block';
    audio.oncanplay = () => loader.style.display = 'none';

    audio.onplay = () => { 
        isPlaying = true; updatePlayBtn(); sendStatus(true); 
        if (currentBgMode === 'video') videoBg.play().catch(()=>{}); 
        const item = document.getElementById(`track-${currentIdx}`); if(item) item.classList.add('playing'); 
    };
    
    audio.onpause = () => { 
        isPlaying = false; updatePlayBtn(); sendStatus(false); 
        videoBg.pause(); 
        const item = document.getElementById(`track-${currentIdx}`); if(item) item.classList.remove('playing'); 
    };
    
    audio.onended = () => { if (isRepOne) audio.play(); else nextTrack(); };
    
    audio.ontimeupdate = () => { 
        // 1. Обновляем полоску прогресса
        const progress = (audio.currentTime / audio.duration * 100);
        document.getElementById('p-bar').style.width = (progress || 0) + '%'; 
        
        // 2. СИНХРОНИЗАЦИЯ ВИДЕО-ФОНА (Исправлено)
        if (currentBgMode === 'video' && videoBg.duration) {
            // Если аудио на паузе или грузится — стопим видео
            if (audio.paused || audio.seeking) {
                if (!videoBg.paused) videoBg.pause();
            } else {
                if (videoBg.paused) videoBg.play().catch(()=>{});
            }

            const videoPos = audio.currentTime % videoBg.duration;
            // Уменьшили порог до 0.2 сек для точности
            if (Math.abs(videoBg.currentTime - videoPos) > 0.2) {
                videoBg.currentTime = videoPos;
            }
        }

        // 3. Обновляем цифры времени
        document.getElementById('curr').innerText = fmt(audio.currentTime); 
        if(!isNaN(audio.duration)) {
            document.getElementById('dur').innerText = fmt(audio.duration); 
        }
    };
    
    document.getElementById('p-cont').onclick = (e) => { audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration; };

    fullVideo.onplay = () => { document.getElementById('v-p-path').setAttribute('d', 'M6 19h4V5H6zm8-14v14h4V5h-4z'); };
    fullVideo.onpause = () => { document.getElementById('v-p-path').setAttribute('d', 'M8 5v14l11-7z'); };
    document.getElementById('v-p-cont').onclick = (e) => { fullVideo.currentTime = (e.offsetX / e.currentTarget.clientWidth) * fullVideo.duration; };
    fullVideo.ontimeupdate = () => {
        document.getElementById('v-p-bar').style.width = (fullVideo.currentTime / fullVideo.duration * 100) + '%';
        document.getElementById('v-curr').innerText = fmt(fullVideo.currentTime);
        if(!isNaN(fullVideo.duration)) document.getElementById('v-dur').innerText = fmt(fullVideo.duration);
    };

window.addEventListener('message', (e) => {
    if (e.data.type === 'LOAD_PLAYLIST') { 
        JSON_URL = e.data.url; 
        // Принудительно сбрасываем флаг, чтобы новый список точно загрузился
        isInitializing = false; 
        init(); 
        toggleScreen('list'); 
    }
    if (e.data.type === 'SHOW_LIST_ONLY') toggleScreen('list');
    if (e.data.type === 'OPEN_CURRENT') toggleScreen('player');
    if (e.data.type === 'TOGGLE') document.getElementById('play').click();
    if (e.data.type === 'GET_STATUS') sendStatus(isPlaying);
});
	
	function minimizePlayer() {
   		const activeScreen = document.querySelector('.screen-active');
   		if (!activeScreen) return;
   		activeScreen.classList.replace('screen-active', 'screen-hidden');
   		const toast = document.getElementById('toast');
   		toast.innerText = "Нажмите на экран, чтобы вернуть интерфейс";
   		toast.style.opacity = 1;
   		setTimeout(() => toast.style.opacity = 0, 3000);
   		setTimeout(() => {
      			document.body.onclick = () => {
          			activeScreen.classList.replace('screen-hidden', 'screen-active');
           			document.body.onclick = null;
       			};
   		}, 300);
	}

	function showToast(text, duration = 2000) {
   		const toast = document.getElementById('toast');
 		  toast.innerText = text;
 		  toast.style.opacity = 1;
  		 setTimeout(() => toast.style.opacity = 0, duration);
	}


function closeFullPlayer() {
    window.parent.postMessage({ type: 'CLOSE_PLAYER' }, '*');
}

</script>
</body>
